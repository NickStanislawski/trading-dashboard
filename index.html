
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Watch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:         #0a0c0f;
      --surface:    #111318;
      --surface2:   #161920;
      --border:     #1e2128;
      --muted:      #3a3f4a;
      --text:       #c8cdd8;
      --text-dim:   #6b7280;
      --accent:     #3b82f6;
      --buy:        #22c55e;
      --buy-dim:    #14532d;
      --sell:       #ef4444;
      --sell-dim:   #7f1d1d;
      --neutral:    #eab308;
      --neutral-dim:#713f12;
      --star:       #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    #clock {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }
    #refresh-status { font-size: 11px; color: var(--text-dim); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .add-bar {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 260px;
    }
    .add-bar input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 4px;
      outline: none;
      width: 120px;
      transition: border-color 0.15s;
    }
    .add-bar input:focus { border-color: var(--accent); }
    .add-bar input::placeholder { color: var(--muted); text-transform: none; letter-spacing: normal; }

    /* sort controls */
    .sort-group {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
    }
    .sort-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding-right: 4px;
      border-right: 1px solid var(--border);
      margin-right: 2px;
    }
    .sort-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .sort-btn:hover { color: var(--text); }
    .sort-btn.active { background: var(--accent); color: #fff; }

    .dir-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      transition: color 0.12s;
      line-height: 1;
    }
    .dir-btn:hover { color: var(--text); }

    /* filter tabs */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .tab {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--muted); color: var(--text); }
    .tab.active { border-color: transparent; color: #fff; }
    .tab.all.active    { background: var(--accent); }
    .tab.buy.active    { background: var(--buy-dim); color: var(--buy); border-color: var(--buy); }
    .tab.sell.active   { background: var(--sell-dim); color: var(--sell); border-color: var(--sell); }
    .tab.hold.active   { background: var(--neutral-dim); color: var(--neutral); border-color: var(--neutral); }
    .tab.fav.active    { background: #78350f; color: var(--star); border-color: var(--star); }

    .tab-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      opacity: 0.7;
      margin-left: 4px;
    }

    /* ── Buttons ── */
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn.secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn.secondary:hover { border-color: var(--accent); color: var(--text); }

    /* ── Grid ── */
    #watchlist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: var(--muted); }
    .card.favorited { border-color: #78350f; }
    .card.favorited:hover { border-color: var(--star); }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .card.BUY::before  { background: var(--buy); }
    .card.SELL::before { background: var(--sell); }
    .card.HOLD::before { background: var(--neutral); }

    /* rank badge */
    .rank-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Card header ── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 44px 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .ticker-row { display: flex; align-items: center; gap: 8px; }
    .ticker {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e8eaf0;
      line-height: 1;
    }
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
      padding: 0;
      margin-top: 2px;
    }
    .star-btn:hover   { color: var(--star); transform: scale(1.2); }
    .star-btn.on      { color: var(--star); }

    .company-name { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    .price-block { text-align: right; }
    .price {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: #e8eaf0;
    }
    .price-change {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      margin-top: 3px;
    }
    .price-change.up   { color: var(--buy); }
    .price-change.down { color: var(--sell); }
    .price-change.flat { color: var(--text-dim); }

    /* ── Signal badge ── */
    .signal-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px 9px 20px;
      border-bottom: 1px solid var(--border);
    }
    .signal-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .signal-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 12px;
      border-radius: 3px;
    }
    .signal-value.BUY  { background: var(--buy-dim);     color: var(--buy); }
    .signal-value.SELL { background: var(--sell-dim);    color: var(--sell); }
    .signal-value.HOLD { background: var(--neutral-dim); color: var(--neutral); }

    /* strength bar */
    .strength-wrap { display: flex; align-items: center; gap: 8px; }
    .strength-bar-outer {
      width: 60px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-bar-inner { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .BUY  .strength-bar-inner { background: var(--buy); }
    .SELL .strength-bar-inner { background: var(--sell); }
    .HOLD .strength-bar-inner { background: var(--neutral); }
    .signal-score {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ── Indicators ── */
    .indicators { padding: 10px 16px 10px 20px; }
    .ind-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .ind-row:last-child { border-bottom: none; }
    .ind-name {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      width: 110px;
      flex-shrink: 0;
    }
    .ind-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text);
      flex: 1;
      text-align: center;
    }
    .ind-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 9px;
      border-radius: 2px;
      width: 56px;
      text-align: center;
    }
    .ind-pill.BUY  { background: var(--buy-dim);     color: var(--buy); }
    .ind-pill.SELL { background: var(--sell-dim);    color: var(--sell); }
    .ind-pill.HOLD { background: var(--neutral-dim); color: var(--neutral); }

    /* ── Card footer ── */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 16px 7px 20px;
      border-top: 1px solid var(--border);
    }
    .updated-at {
      font-size: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }
    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .remove-btn:hover { color: var(--sell); background: var(--sell-dim); }

    /* ── Empty state ── */
    .empty-msg {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 0;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.8;
    }
    .empty-msg strong {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 6px;
    }

    /* ── Pulse ── */
    .pulse {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--buy);
      margin-right: 6px;
      animation: blink 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">&#9632; Market Watch</div>
  <div class="header-right">
    <span id="clock"></span>
    <span id="refresh-status"><span class="pulse"></span>Simulated — refreshes every 60s</span>
    <button class="btn secondary" onclick="refreshAll()">Refresh Now</button>
  </div>
</header>

<!-- Toolbar: add + sort -->
<div class="toolbar">
  <div class="add-bar">
    <input type="text" id="ticker-input" placeholder="e.g. NVDA" maxlength="6" />
    <button class="btn" onclick="addStock()">+ Add</button>
  </div>

  <div class="sort-group">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sb-signal"  onclick="setSort('signal')">Signal</button>
    <button class="sort-btn"        id="sb-change"  onclick="setSort('change')">% Change</button>
    <button class="sort-btn"        id="sb-alpha"   onclick="setSort('alpha')">A–Z</button>
    <button class="sort-btn"        id="sb-fav"     onclick="setSort('fav')">★ First</button>
    <button class="dir-btn" id="dir-btn" onclick="toggleDir()" title="Flip order">↓</button>
  </div>
</div>

<!-- Filter tabs -->
<div class="filter-tabs">
  <button class="tab all active" onclick="setFilter('all')">All <span class="tab-count" id="cnt-all">0</span></button>
  <button class="tab buy"        onclick="setFilter('BUY')">Buy <span class="tab-count" id="cnt-buy">0</span></button>
  <button class="tab sell"       onclick="setFilter('SELL')">Sell <span class="tab-count" id="cnt-sell">0</span></button>
  <button class="tab hold"       onclick="setFilter('HOLD')">Hold <span class="tab-count" id="cnt-hold">0</span></button>
  <button class="tab fav"        onclick="setFilter('fav')">★ Favorites <span class="tab-count" id="cnt-fav">0</span></button>
</div>

<div id="watchlist"></div>

<script>
  /* ─── Company names ─── */
  const NAMES = {
    AAPL:'Apple Inc.', MSFT:'Microsoft Corp.', GOOGL:'Alphabet Inc.',
    AMZN:'Amazon.com Inc.', TSLA:'Tesla Inc.', META:'Meta Platforms',
    NVDA:'NVIDIA Corp.', AMD:'Advanced Micro Devices', SPY:'S&P 500 ETF',
    GLD:'Gold ETF', SLV:'Silver ETF', USO:'Oil ETF',
    BTC:'Bitcoin', ETH:'Ethereum', GC:'Gold Futures', CL:'Crude Oil',
    MSCI:'MSCI Inc.', JNJ:'Johnson & Johnson', WMT:'Walmart Inc.',
  };

  /* ─── State ─── */
  let watchlist = JSON.parse(localStorage.getItem('mw_watchlist') || '["AAPL","GLD","CL","NVDA","TSLA"]');
  let favorites = new Set(JSON.parse(localStorage.getItem('mw_favs') || '[]'));
  let cardData  = {};
  let sortMode  = 'signal';   // signal | change | alpha | fav
  let sortAsc   = false;       // true = ascending
  let filterMode= 'all';       // all | BUY | SELL | HOLD | fav

  /* ─── Fake data (replace with fetch to Flask) ─── */
  function generateFakeData(symbol) {
    const price   = +(50 + Math.random() * 950).toFixed(2);
    const change  = +((Math.random() - 0.46) * 8).toFixed(2);
    const pct     = +((change / price) * 100).toFixed(2);

    const rsi     = +(30 + Math.random() * 50).toFixed(1);
    const macd    = +((Math.random() - 0.48) * 2).toFixed(3);
    const macdSig = +((Math.random() - 0.5)  * 2).toFixed(3);
    const sma9    = +(price * (0.97 + Math.random() * 0.06)).toFixed(2);
    const sma21   = +(price * (0.95 + Math.random() * 0.10)).toFixed(2);
    const bbUpper = +(price * 1.04).toFixed(2);
    const bbLower = +(price * 0.96).toFixed(2);
    const vol     = Math.floor(500000  + Math.random() * 9500000);
    const avgVol  = Math.floor(1000000 + Math.random() * 8000000);

    const rsiSig   = rsi < 40 ? 'BUY' : rsi > 65 ? 'SELL' : 'HOLD';
    const macdSig2 = macd > macdSig ? 'BUY' : macd < macdSig ? 'SELL' : 'HOLD';
    const maSig    = sma9 > sma21 ? 'BUY' : sma9 < sma21 ? 'SELL' : 'HOLD';
    const bbSig    = price < bbLower ? 'BUY' : price > bbUpper ? 'SELL' : 'HOLD';
    const volSig   = vol > avgVol * 1.2 ? (change >= 0 ? 'BUY' : 'SELL') : 'HOLD';

    const signals   = [rsiSig, macdSig2, maSig, bbSig, volSig];
    const buyCount  = signals.filter(s => s === 'BUY').length;
    const sellCount = signals.filter(s => s === 'SELL').length;
    const overall   = buyCount > sellCount ? 'BUY' : sellCount > buyCount ? 'SELL' : 'HOLD';
    const strength  = Math.max(buyCount, sellCount) / 5; // 0–1

    return {
      symbol, name: NAMES[symbol] || symbol,
      price, change, pct,
      indicators: [
        { name: 'RSI (14)',        value: `${rsi}`,                      signal: rsiSig },
        { name: 'MACD',            value: `${macd} / sig ${macdSig}`,    signal: macdSig2 },
        { name: 'MA Cross 9/21',   value: `${sma9} / ${sma21}`,          signal: maSig },
        { name: 'Bollinger Bands', value: `L ${bbLower} · H ${bbUpper}`, signal: bbSig },
        { name: 'Volume',          value: `${(vol/1e6).toFixed(2)}M`,     signal: volSig },
      ],
      overall, strength,
      buyCount, sellCount,
      score: `${buyCount}B · ${sellCount}S · ${5-buyCount-sellCount}H`,
      updatedAt: new Date().toLocaleTimeString(),
    };
  }

  /* ─── Sorting ─── */
  const SIGNAL_ORDER = { BUY: 0, HOLD: 1, SELL: 2 };

  function getSortedFiltered() {
    let list = watchlist.map(s => cardData[s]).filter(Boolean);

    // filter
    if (filterMode === 'fav')        list = list.filter(d => favorites.has(d.symbol));
    else if (filterMode !== 'all')   list = list.filter(d => d.overall === filterMode);

    // sort
    list.sort((a, b) => {
      let v = 0;
      if (sortMode === 'signal') {
        // favorites always first within signal sort
        const af = favorites.has(a.symbol) ? 0 : 1;
        const bf = favorites.has(b.symbol) ? 0 : 1;
        if (af !== bf) return af - bf;
        v = SIGNAL_ORDER[a.overall] - SIGNAL_ORDER[b.overall];
        if (v === 0) v = b.strength - a.strength; // stronger signal first
      } else if (sortMode === 'change') {
        v = b.pct - a.pct;
      } else if (sortMode === 'alpha') {
        v = a.symbol.localeCompare(b.symbol);
      } else if (sortMode === 'fav') {
        const af = favorites.has(a.symbol) ? 0 : 1;
        const bf = favorites.has(b.symbol) ? 0 : 1;
        v = af !== bf ? af - bf : SIGNAL_ORDER[a.overall] - SIGNAL_ORDER[b.overall];
      }
      return sortAsc ? -v : v;
    });

    return list;
  }

  /* ─── Render ─── */
  function render() {
    const container = document.getElementById('watchlist');
    container.innerHTML = '';

    // update tab counts
    const all  = watchlist.map(s => cardData[s]).filter(Boolean);
    document.getElementById('cnt-all').textContent  = all.length;
    document.getElementById('cnt-buy').textContent  = all.filter(d => d.overall==='BUY').length;
    document.getElementById('cnt-sell').textContent = all.filter(d => d.overall==='SELL').length;
    document.getElementById('cnt-hold').textContent = all.filter(d => d.overall==='HOLD').length;
    document.getElementById('cnt-fav').textContent  = all.filter(d => favorites.has(d.symbol)).length;

    const sorted = getSortedFiltered();

    if (sorted.length === 0) {
      const em = document.createElement('div');
      em.className = 'empty-msg';
      em.innerHTML = watchlist.length === 0
        ? '<strong>Watchlist is empty</strong>Type a ticker above and click Add.'
        : '<strong>No matches</strong>Try a different filter.';
      container.appendChild(em);
      return;
    }

    sorted.forEach((d, idx) => {
      const isFav = favorites.has(d.symbol);
      const card  = document.createElement('div');
      card.id      = `card-${d.symbol}`;
      card.className = `card ${d.overall}${isFav ? ' favorited' : ''}`;

      card.innerHTML = `
        <div class="rank-badge">#${idx + 1}</div>
        <div class="card-header">
          <div>
            <div class="ticker-row">
              <div class="ticker">${d.symbol}</div>
              <button class="star-btn ${isFav ? 'on' : ''}"
                      onclick="toggleFav('${d.symbol}')"
                      title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
                ${isFav ? '★' : '☆'}
              </button>
            </div>
            <div class="company-name">${d.name}</div>
          </div>
          <div class="price-block">
            <div class="price">$${d.price.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
            <div class="price-change ${d.change>=0?'up':'down'}">
              ${d.change>=0?'+':''}${d.change} (${d.change>=0?'+':''}${d.pct}%)
            </div>
          </div>
        </div>

        <div class="signal-badge ${d.overall}">
          <span class="signal-label">Overall Signal</span>
          <span class="signal-value ${d.overall}">${d.overall}</span>
          <div class="strength-wrap">
            <div class="strength-bar-outer">
              <div class="strength-bar-inner" style="width:${Math.round(d.strength*100)}%"></div>
            </div>
            <span class="signal-score">${d.score}</span>
          </div>
        </div>

        <div class="indicators">
          ${d.indicators.map(i => `
            <div class="ind-row">
              <span class="ind-name">${i.name}</span>
              <span class="ind-value">${i.value}</span>
              <span class="ind-pill ${i.signal}">${i.signal}</span>
            </div>
          `).join('')}
        </div>

        <div class="card-footer">
          <span class="updated-at">Updated ${d.updatedAt}</span>
          <button class="remove-btn" onclick="removeStock('${d.symbol}')">Remove</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  /* ─── Actions ─── */
  function addStock() {
    const input = document.getElementById('ticker-input');
    const sym   = input.value.trim().toUpperCase();
    if (!sym || watchlist.includes(sym)) { input.value = ''; return; }
    watchlist.push(sym);
    save();
    cardData[sym] = generateFakeData(sym);
    render();
    input.value = '';
  }

  function removeStock(sym) {
    watchlist = watchlist.filter(s => s !== sym);
    favorites.delete(sym);
    delete cardData[sym];
    save();
    render();
  }

  function toggleFav(sym) {
    if (favorites.has(sym)) favorites.delete(sym);
    else favorites.add(sym);
    save();
    render();
  }

  function refreshAll() {
    watchlist.forEach(s => { cardData[s] = generateFakeData(s); });
    render();
    document.getElementById('refresh-status').innerHTML =
      `<span class="pulse"></span>Last refresh: ${new Date().toLocaleTimeString()}`;
  }

  function setSort(mode) {
    sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`sb-${mode}`).classList.add('active');
    render();
  }

  function toggleDir() {
    sortAsc = !sortAsc;
    document.getElementById('dir-btn').textContent = sortAsc ? '↑' : '↓';
    render();
  }

  function setFilter(mode) {
    filterMode = mode;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const map = { all:'all', BUY:'buy', SELL:'sell', HOLD:'hold', fav:'fav' };
    document.querySelector(`.tab.${map[mode]}`).classList.add('active');
    render();
  }

  function save() {
    localStorage.setItem('mw_watchlist', JSON.stringify(watchlist));
    localStorage.setItem('mw_favs',      JSON.stringify([...favorites]));
  }

  /* ─── Clock ─── */
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  }, 1000);
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();

  /* ─── Auto-refresh ─── */
  setInterval(refreshAll, 60000);

  /* ─── Enter key ─── */
  document.getElementById('ticker-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addStock();
  });

  /* ─── Init ─── */
  refreshAll();
</script>
</body>
</html>
